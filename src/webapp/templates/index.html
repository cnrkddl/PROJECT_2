<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Video Ad Experience</title>
    <!-- Google Fonts for modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="app-container">
        <header class="app-header">
            <h1 class="title-highlight">광고 추천/ 삽입 서비스</h1>
            <p>광고 넣어보자~.~</p>
        </header>

        <main class="player-wrapper">
            <!-- Video Container -->
            <div class="video-container" id="videoContainer">
                <video id="mainVideo" controls poster="">
                    <source src="/video" type="video/mp4">
                    Your browser does not support the video tag.
                </video>

                <!-- Overlay Container (where banners will be injected) -->
                <div id="overlayContainer" class="overlay-container">
                    <!-- Banners will be dynamically rendered here by JS -->
                </div>
            </div>

            <!-- Ad Timeline Info -->
            <aside class="timeline-panel">
                <h2>Upcoming Ads</h2>
                <ul id="timelineList" class="timeline-list">
                    <!-- Generated by JS -->
                </ul>
            </aside>
        </main>
    </div>

    <!-- Pass JSON timetable to frontend safely -->
    <script id="timetableData" type="application/json">
        {{ timetable_json | safe }}
    </script>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
